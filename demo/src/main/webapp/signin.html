<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/signin.css">
</head>
<body>
    <div class="glass">
        <!-- <h1>Sign-in</h1> -->
        <div class="switch-btn">
            <button class="signupbtn">Sign Up</button>
            <button class="loginbtn">Login</button>
        </div>
        <form action="" name="signin" onsubmit="return validateForm()" onreset="reset()">
            <p>
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your name">
                <span id="name-error" class="error-msg"></span>
            </p>
            <p>
                <label for="gender">Gender:</label>
                <input type="radio" id="male" name="gender" value="Male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>
                <input type="radio" id="other" name="gender" value="Other">
                <label for="other">Other</label>
                <br>
                <span id="gender-error" class="error-msg"></span>
            </p>            
            <p>
                <label for="email">Email:</label>
                <input type="text" id="email" placeholder="Enter your email">
                <span id="email-error" class="error-msg"></span>
            </p>
            <p>
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter your password">
                <span id="password-error" class="error-msg"></span>
            </p>
            <p>
                <label for="address">Address:</label>
                <input type="text" id="address" placeholder="Enter your address">
                <span id="address-error" class="error-msg"></span>
            </p>
            <p>
                <label for="phone">Phone no:</label>
                <input type="text" id="number" placeholder="Enter your phone number">
                <span id="phone-error" class="error-msg"></span>
            </p>
            <p>
                <input type="checkbox" id="agree" name="agree">
                <label for="agree">Agree to above information</label>
                <span id="agree-error" class="error-msg"></span>
            </p>
            <p>
                <input type="submit" id="submit" name="submit" value="submit">
                <input type="reset" id="reset" name="reset" value="reset">
            </p>
        </form>
    </div>
    <script src="js/signin.js"></script>
</body>
</html>
